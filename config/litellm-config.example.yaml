    - claude-sonnet-4-6-grp1: ["claude-opus-4-7-grp1", "vertex-claude-opus", "gpt-5.5-grp1"]
    - claude-sonnet-4-6-grp2: ["claude-opus-4-7-grp2", "vertex-claude-opus", "gpt-5.5-grp2"]
    - claude-sonnet-4-6-grp3: ["claude-opus-4-7-grp3", "vertex-claude-opus", "gpt-5.5-grp3"]
    - claude-sonnet-4-6-grp4: ["claude-opus-4-7-grp4", "vertex-claude-opus", "gpt-5.5-grp4"]
    - claude-sonnet-4-6-grp5: ["claude-opus-4-7-grp5", "vertex-claude-opus", "gpt-5.5-grp5"]

router_settings:
  routing_strategy: simple-shuffle
  enable_weighted_failover: true
  enable_pre_call_checks: true
  allowed_fails: 2
  cooldown_time: 90
  num_retries: 2
  retry_after: 5
  timeout: 120
  redis_host: os.environ/REDIS_HOST
  redis_port: os.environ/REDIS_PORT
  redis_password: os.environ/REDIS_PASSWORD
  redis_ssl: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  database_connection_pool_limit: 10
  database_connection_timeout: 60
  store_model_in_db: true
  disable_spend_logs: false
  disable_error_logs: false
  alerting: ["slack"]
  proxy_batch_write_at: 60
  proxy_batch_polling_interval: 60

environment_variables:
