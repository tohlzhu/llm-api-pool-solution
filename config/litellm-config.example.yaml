    tpm_limit: 6000000
    rpm_limit: 6000

guardrails:
  full_request_response_logging:
    required_approvals: ["security", "legal", "data_protection_officer"]
    storage_controls:
      encryption_at_rest: required
      encryption_in_transit: required
      rbac: required
      access_review_days: 30
      retention_days: 90
      break_glass_approval: required
  batch_workload_isolation:
    dedicated_models: ["batch-claude-haiku", "batch-gpt-nano", "batch-gemini-flash"]
    deny_fallback_to_interactive_models: true
    preferred_models: ["batch-gpt-nano", "batch-gemini-flash", "batch-claude-haiku"]
    repeated_prompt_review: required
  model_name_isolation:
    groups: 5
    endpoints_per_group: 2
    total_endpoints: 10
    fallback_policy: "cross-model-same-group"
    deny_cross_group_fallback_for_same_model: true
  log_archival:
    postgres_hot_retention_days: 30
    archive_schedule: "nightly-low-traffic-window"
    archive_targets: ["clickhouse", "elasticsearch"]
    require_row_count_validation: true
    delete_source_after_archive_validation: true
    failure_behavior: "keep_source_data"
