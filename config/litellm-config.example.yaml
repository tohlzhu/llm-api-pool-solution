litellm_settings:
  drop_params: true
  request_timeout: 60
  num_retries: 3
  success_callback: ["langfuse", "otel", "azure_sentinel"]
  failure_callback: ["langfuse", "otel", "azure_sentinel", "sentry"]
  callbacks: ["langfuse", "otel"]
  turn_off_message_logging: false
  redact_user_api_key_info: true
  global_disable_no_log_param: true
  store_prompts_in_spend_logs: true
  # Fallbacks: cross-model within same group number, never cross-group for same model.
  # This prevents policy-violation traffic from spreading to healthy groups.
  fallbacks:
    - claude-opus-1: ["claude-sonnet-1", "gpt-frontier-1", "vertex-claude-sonnet"]
    - claude-opus-2: ["claude-sonnet-2", "gpt-frontier-2", "vertex-claude-sonnet"]
    - claude-opus-3: ["claude-sonnet-3", "gpt-frontier-3", "vertex-claude-sonnet"]
    - claude-opus-4: ["claude-sonnet-4", "gpt-frontier-4", "vertex-claude-sonnet"]
    - claude-opus-5: ["claude-sonnet-5", "gpt-frontier-5", "vertex-claude-sonnet"]
    - claude-sonnet-1: ["gpt-frontier-1", "vertex-claude-sonnet"]
    - claude-sonnet-2: ["gpt-frontier-2", "vertex-claude-sonnet"]
    - claude-sonnet-3: ["gpt-frontier-3", "vertex-claude-sonnet"]
    - claude-sonnet-4: ["gpt-frontier-4", "vertex-claude-sonnet"]
    - claude-sonnet-5: ["gpt-frontier-5", "vertex-claude-sonnet"]
    - claude-haiku-1: ["claude-sonnet-1", "gpt-frontier-1"]
    - claude-haiku-2: ["claude-sonnet-2", "gpt-frontier-2"]
    - claude-haiku-3: ["claude-sonnet-3", "gpt-frontier-3"]
    - claude-haiku-4: ["claude-sonnet-4", "gpt-frontier-4"]
    - claude-haiku-5: ["claude-sonnet-5", "gpt-frontier-5"]
    - gpt-frontier-1: ["claude-sonnet-1", "vertex-claude-sonnet"]
    - gpt-frontier-2: ["claude-sonnet-2", "vertex-claude-sonnet"]
    - gpt-frontier-3: ["claude-sonnet-3", "vertex-claude-sonnet"]
    - gpt-frontier-4: ["claude-sonnet-4", "vertex-claude-sonnet"]
    - gpt-frontier-5: ["claude-sonnet-5", "vertex-claude-sonnet"]
    - batch-claude-haiku: ["batch-gpt-nano", "batch-gemini-flash"]
    - batch-gpt-nano: ["batch-gemini-flash"]
  context_window_fallbacks:
    - claude-haiku-1: ["claude-sonnet-1", "gpt-frontier-1"]
    - claude-haiku-2: ["claude-sonnet-2", "gpt-frontier-2"]
    - claude-haiku-3: ["claude-sonnet-3", "gpt-frontier-3"]
    - claude-haiku-4: ["claude-sonnet-4", "gpt-frontier-4"]
    - claude-haiku-5: ["claude-sonnet-5", "gpt-frontier-5"]
    - claude-sonnet-1: ["claude-opus-1", "gpt-frontier-1"]
    - claude-sonnet-2: ["claude-opus-2", "gpt-frontier-2"]
    - claude-sonnet-3: ["claude-opus-3", "gpt-frontier-3"]
    - claude-sonnet-4: ["claude-opus-4", "gpt-frontier-4"]
    - claude-sonnet-5: ["claude-opus-5", "gpt-frontier-5"]
  content_policy_fallbacks:
    - claude-sonnet-1: ["gpt-frontier-1"]
    - claude-sonnet-2: ["gpt-frontier-2"]
    - claude-sonnet-3: ["gpt-frontier-3"]
    - claude-sonnet-4: ["gpt-frontier-4"]
    - claude-sonnet-5: ["gpt-frontier-5"]
    - claude-opus-1: ["gpt-frontier-1"]
    - claude-opus-2: ["gpt-frontier-2"]
    - claude-opus-3: ["gpt-frontier-3"]
    - claude-opus-4: ["gpt-frontier-4"]
    - claude-opus-5: ["gpt-frontier-5"]

router_settings:
  routing_strategy: simple-shuffle
  enable_weighted_failover: true
  enable_pre_call_checks: true
  allowed_fails: 2
  cooldown_time: 90
  num_retries: 2
  retry_after: 5
  timeout: 120
  redis_host: os.environ/REDIS_HOST
  redis_port: os.environ/REDIS_PORT
  redis_password: os.environ/REDIS_PASSWORD
  redis_ssl: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  database_connection_pool_limit: 10
  database_connection_timeout: 60
  store_model_in_db: true
  disable_spend_logs: false
  disable_error_logs: false
  alerting: ["slack"]
  proxy_batch_write_at: 60
  proxy_batch_polling_interval: 60

environment_variables:
  LANGFUSE_HOST: os.environ/LANGFUSE_HOST
  LANGFUSE_PUBLIC_KEY: os.environ/LANGFUSE_PUBLIC_KEY
  LANGFUSE_SECRET_KEY: os.environ/LANGFUSE_SECRET_KEY
  OTEL_EXPORTER: otlp_http
  OTEL_ENDPOINT: os.environ/OTEL_ENDPOINT
  AZURE_SENTINEL_WORKSPACE_ID: os.environ/AZURE_SENTINEL_WORKSPACE_ID
  AZURE_SENTINEL_SHARED_KEY: os.environ/AZURE_SENTINEL_SHARED_KEY
  SENTRY_DSN: os.environ/SENTRY_DSN
  SLACK_WEBHOOK_URL: os.environ/SLACK_WEBHOOK_URL

# Team settings: each team is assigned to one isolation group.
# Users in group N can only access model_name *-N variants.
team_settings:
  - team_id: engineering-group-1
    team_alias: Engineering Group 1
    max_budget: 10000
    budget_duration: 30d
    models: ["claude-opus-1", "claude-sonnet-1", "claude-haiku-1", "gpt-frontier-1"]
    tpm_limit: 4000000
    rpm_limit: 4000
  - team_id: engineering-group-2
    team_alias: Engineering Group 2
    max_budget: 10000
    budget_duration: 30d
    models: ["claude-opus-2", "claude-sonnet-2", "claude-haiku-2", "gpt-frontier-2"]
    tpm_limit: 4000000
    rpm_limit: 4000
  - team_id: engineering-group-3
    team_alias: Engineering Group 3
    max_budget: 10000
    budget_duration: 30d
    models: ["claude-opus-3", "claude-sonnet-3", "claude-haiku-3", "gpt-frontier-3"]
    tpm_limit: 4000000
    rpm_limit: 4000
  - team_id: engineering-group-4
    team_alias: Engineering Group 4
    max_budget: 10000
