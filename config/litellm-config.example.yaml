guardrails:
  batch_workload_isolation:
    dedicated_models:
      - batch-gpt-5.5-grp1
      - batch-gpt-5.5-grp2
      - batch-gpt-5.4-grp1
      - batch-gpt-5.4-grp2
      - batch-gpt-5.4-mini-grp1
      - batch-gpt-5.4-mini-grp2
      - batch-gpt-5.4-nano-grp1
      - batch-gpt-5.4-nano-grp2
    deny_fallback_to_interactive_models: true
    repeated_prompt_review: required
  model_name_isolation:
    groups: 5
    endpoints_per_group_claude: 2
    endpoints_per_group_gpt: 1
    fallback_policy: "cross-model-same-group"
    deny_cross_group_fallback_for_same_model: true
  log_archival:
    postgres_hot_retention_days: 30
    archive_schedule: "nightly-low-traffic-window"
    archive_targets: ["clickhouse", "elasticsearch"]
    require_row_count_validation: true
    delete_source_after_archive_validation: true
    failure_behavior: "keep_source_data"
