litellm_settings:
  drop_params: true
  request_timeout: 60
  num_retries: 3
  success_callback: ["langfuse", "otel", "azure_sentinel"]
  failure_callback: ["langfuse", "otel", "azure_sentinel", "sentry"]
  callbacks: ["langfuse", "otel"]
  turn_off_message_logging: false
  redact_user_api_key_info: true
  global_disable_no_log_param: true
  store_prompts_in_spend_logs: true
  fallbacks:
    - claude-opus: ["claude-sonnet", "gpt-frontier", "vertex-claude-sonnet"]
    - claude-sonnet: ["gpt-frontier", "vertex-claude-sonnet"]
    - claude-haiku: ["claude-sonnet", "gpt-frontier"]
  context_window_fallbacks:
    - claude-haiku: ["claude-sonnet", "gpt-frontier"]
    - claude-sonnet: ["claude-opus", "gpt-frontier"]
  content_policy_fallbacks:
    - claude-sonnet: ["gpt-frontier"]

router_settings:
  routing_strategy: simple-shuffle
  enable_weighted_failover: true
  enable_pre_call_checks: true
  allowed_fails: 2
  cooldown_time: 90
  num_retries: 2
  retry_after: 5
  timeout: 120
  redis_host: os.environ/REDIS_HOST
  redis_port: os.environ/REDIS_PORT
  redis_password: os.environ/REDIS_PASSWORD
  redis_ssl: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  database_connection_pool_limit: 10
  database_connection_timeout: 60
  store_model_in_db: true
  disable_spend_logs: false
  disable_error_logs: false
  alerting: ["slack"]
  proxy_batch_write_at: 60
  proxy_batch_polling_interval: 60

environment_variables:
  LANGFUSE_HOST: os.environ/LANGFUSE_HOST
  LANGFUSE_PUBLIC_KEY: os.environ/LANGFUSE_PUBLIC_KEY
  LANGFUSE_SECRET_KEY: os.environ/LANGFUSE_SECRET_KEY
  OTEL_EXPORTER: otlp_http
  OTEL_ENDPOINT: os.environ/OTEL_ENDPOINT
  AZURE_SENTINEL_WORKSPACE_ID: os.environ/AZURE_SENTINEL_WORKSPACE_ID
  AZURE_SENTINEL_SHARED_KEY: os.environ/AZURE_SENTINEL_SHARED_KEY
  SENTRY_DSN: os.environ/SENTRY_DSN
  SLACK_WEBHOOK_URL: os.environ/SLACK_WEBHOOK_URL

team_settings:
  - team_id: engineering
    team_alias: Engineering
    max_budget: 50000
    budget_duration: 30d
    models: ["claude-opus", "claude-sonnet", "claude-haiku", "gpt-frontier"]
    tpm_limit: 20000000
    rpm_limit: 20000
  - team_id: analyst
    team_alias: Analyst
    max_budget: 15000
    budget_duration: 30d
    models: ["claude-sonnet", "claude-haiku", "gpt-frontier"]
    tpm_limit: 8000000
    rpm_limit: 8000

guardrails:
  full_request_response_logging:
    required_approvals: ["security", "legal", "data_protection_officer"]
    storage_controls:
      encryption_at_rest: required
      encryption_in_transit: required
      rbac: required
      access_review_days: 30
      retention_days: 90
      break_glass_approval: required