# LiteLLM production-oriented example for a multi-subscription Foundry + Vertex pool.
# Replace placeholders with Key Vault-backed environment variables. Do not store secrets in this file.

model_list:
  - model_name: claude-opus
    litellm_params:
      model: azure_ai/claude-opus-4-7
      api_base: os.environ/AZURE_FOUNDRY_01_ENDPOINT
      api_key: os.environ/AZURE_FOUNDRY_01_KEY
      api_version: "2026-02-01-preview"
      tpm: 1800000
      rpm: 2000
      max_parallel_requests: 80
      order: 1
    model_info:
      id: azure-foundry-01-claude-opus
      provider: azure-foundry
      base_model: claude-opus-4-7
      full_content_logging: true
  - model_name: claude-opus
