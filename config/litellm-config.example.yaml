    - batch-gpt-5.5-grp2: ["batch-gpt-5.4-grp2", "batch-gpt-5.4-mini-grp2"]
  content_policy_fallbacks:
    - claude-sonnet-4-6-grp1: ["vertex-claude-sonnet", "gpt-5.5-grp1"]
    - claude-sonnet-4-6-grp2: ["vertex-claude-sonnet", "gpt-5.5-grp2"]
    - claude-sonnet-4-6-grp3: ["vertex-claude-sonnet", "gpt-5.5-grp3"]
