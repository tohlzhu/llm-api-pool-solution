# LiteLLM production-oriented example for a multi-subscription Foundry + Vertex pool.
#
# Naming convention per main document (section 6.1):
#   claude-opus-4-7-grp{1..5}    — 10 Claude subscriptions split into 5 groups (2 per group)
#   claude-sonnet-4-6-grp{1..5}  — same 10 subscriptions, Sonnet endpoints
#   claude-haiku-4-5-grp{1..5}   — same 10 subscriptions, Haiku endpoints
#   gpt-5.5-grp{1..5}            — 5 GPT subscriptions, 1 per group
#   gpt-5.4-grp{1..5}            — same 5 subscriptions
#   gpt-5.4-mini-grp{1..5}       — same 5 subscriptions
#   gpt-5.4-nano-grp{1..5}       — same 5 subscriptions
#   DeepSeek-V4-Pro-grp1         — 1 DeepSeek subscription
#   DeepSeek-V4-Flash-grp1       — same subscription
#   batch-gpt-5.5-grp{1..2}      — 2 batch GPT subscriptions
#   batch-gpt-5.4-grp{1..2}      — same 2 subscriptions
#   batch-gpt-5.4-mini-grp{1..2} — same 2 subscriptions
#   batch-gpt-5.4-nano-grp{1..2} — same 2 subscriptions
#
# Each subscription hosts ONE model family only (Claude OR GPT OR DeepSeek).
# Replace placeholders with Key Vault-backed env vars.

model_list:
  # ============================================================
  # Claude Opus — 5 isolated groups, 2 Claude endpoints per group
  # Subscriptions: llmpool-claude-sub1..sub10
  # ============================================================
  # Group 1: sub1 + sub2
  - model_name: claude-opus-4-7-grp1
    litellm_params:
      model: azure_ai/claude-opus-4-7
      api_base: os.environ/AZURE_CLAUDE_SUB01_ENDPOINT
      api_key: os.environ/AZURE_CLAUDE_SUB01_KEY
      tpm: 1800000
      rpm: 2000
      max_parallel_requests: 80
    model_info:
      id: claude-sub01-opus
      base_model: claude-opus-4-7
      isolation_group: 1
