litellm_settings:
  drop_params: true
  request_timeout: 60
  num_retries: 3
  success_callback: ["langfuse", "otel", "azure_sentinel"]
  failure_callback: ["langfuse", "otel", "azure_sentinel", "sentry"]
  turn_off_message_logging: false
  redact_user_api_key_info: true
  global_disable_no_log_param: true
  store_prompts_in_spend_logs: true
  # Fallback priority per section 6.2:
  #   Foundry Claude → Vertex Claude (same model type) → GPT (cross-model)
  #   Never cross-group for same model — prevents policy-violation traffic spreading.
  fallbacks:
    - claude-opus-4-7-grp1: ["vertex-claude-opus", "claude-sonnet-4-6-grp1", "vertex-claude-sonnet", "gpt-5.5-grp1"]
    - claude-opus-4-7-grp2: ["vertex-claude-opus", "claude-sonnet-4-6-grp2", "vertex-claude-sonnet", "gpt-5.5-grp2"]
