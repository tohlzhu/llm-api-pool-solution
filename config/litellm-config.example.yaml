    - claude-haiku-4-5-grp4: ["vertex-claude-haiku", "claude-sonnet-4-6-grp4", "vertex-claude-sonnet", "gpt-5.4-mini-grp4"]
    - claude-haiku-4-5-grp5: ["vertex-claude-haiku", "claude-sonnet-4-6-grp5", "vertex-claude-sonnet", "gpt-5.4-mini-grp5"]
    - gpt-5.5-grp1: ["gpt-5.4-grp1", "claude-sonnet-4-6-grp1", "vertex-claude-sonnet"]
    - gpt-5.5-grp2: ["gpt-5.4-grp2", "claude-sonnet-4-6-grp2", "vertex-claude-sonnet"]
    - gpt-5.5-grp3: ["gpt-5.4-grp3", "claude-sonnet-4-6-grp3", "vertex-claude-sonnet"]
